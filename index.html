<!DOCTYPE html>

</head>

    <br><br>

    <label>Select Standard</label><br>

    <select id="standard">

        <option>10th Standard</option>
        <option>11th Standard</option>
        <option>12th Standard</option>

    <br><br>

    <button onclick="join()">Join Now</button>

    <h3 id="result"></h3>

</div>

<script src="script.js"></script>

</body>
</html>
